<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Custom Scaffold | Shrooms</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/custom-order.css">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>


<main class="custom-page">

    <section class="custom-card">

        <h1>Custom Scaffold</h1>
        <div class="red-line"></div>

        <p class="intro">
            Need a scaffold solution built around your project?
            Tell us more about the dimensions, location and access requirements.
            Our team will review your request and prepare a custom scaffold solution
            designed for safe and efficient work on your site.
        </p>

        <form th:action="@{/custom-order}" th:method="post" th:object="${customOrderRequest}">

            <div class="form-group">
                <label for="projectName">Project name</label>
                <input id="projectName" type="text" th:field="*{projectName}" placeholder="Example: Roof renovation">
            </div>

            <div class="dimensions">
                <div class="form-group">
                    <label for="height">Height</label>
                    <input id="height" type="number" step="0.01" th:field="*{height}" placeholder="m">
                </div>

                <div class="form-group">
                    <label for="width">Width</label>
                    <input id="width" type="number" step="0.01" th:field="*{width}" placeholder="m">
                </div>

                <div class="form-group">
                    <label for="length">Length</label>
                    <input id="length" type="number" step="0.01" th:field="*{length}" placeholder="m">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Project address</label>
                <input id="address" type="text" th:field="*{address}" placeholder="Enter project address">
            </div>

            <div class="form-group">
                <label for="contactPhone">Contact phone</label>
                <input id="contactPhone" type="text" th:field="*{contactPhone}" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label for="projectDescription">Project description</label>
                <textarea id="projectDescription"
                          th:field="*{projectDescription}"
                          placeholder="Describe your project, access needs and special requirements"></textarea>
            </div>
            <div class="form-group">
                <label for="orderType">Request type</label>
                <select id="orderType" th:field="*{orderType}">
                    <option value="RENT">Rent</option>
                    <option value="PURCHASE">Purchase</option>
                </select>
            </div>
            <small class="error-message"
                   th:if="${customOrderError}"
                   th:text="${customOrderError}">
            </small>

            <div class="date-row">
                <div class="form-group">
                    <label for="startDate">Start date</label>
                    <input id="startDate" type="date" th:field="*{startDate}">
                </div>

                <small class="error-message"
                       th:if="${dateError}"
                       th:text="${dateError}">
                </small>

                <div class="form-group">
                    <label for="endDate">End date</label>
                    <input id="endDate" type="date" th:field="*{endDate}">
                </div>
            </div>

            <label class="checkbox-row">
                <input type="checkbox" th:field="*{installationRequired}">
                <span>Installation required</span>
            </label>

            <button type="submit">Submit Request</button>

        </form>

    </section>

</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
