<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Shrooms</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<header class="header">
    <a href="@{/}"  class="logo">
        <img src="/images/skull-logo.png" alt="Shrooms logo">

        <div class="logo-text">
            <div class="logo-title">SHROOMS</div>
            <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
        </div>
    </a>

    <nav class="nav">
        <a th:href="@{/}" >Home</a>
        <a th:href="@{/our-work}">Our Work</a>
        <a th:href="@{/orders}">My Orders</a>
        <a th:href="@{/logout}" class="logout-btn">Logout</a>
    </nav>
</header>

<main class="profile-page">

    <section class="profile-card">

        <img class="profile-image"
             th:src="${user.getProfilePicture}"
             alt="Profile picture">

        <h1>My Profile</h1>
        <div class="red-line"></div>

        <div class="profile-info">
            <p><span>Id:</span> <small th:text="${user.getId()}">Id</small></p>
            <p><span>Username:</span> <strong th:text="${user.getUsername()}">username</strong></p>
            <p><span>First name:</span> <strong th:text="${user.getFirstName()}">First</strong></p>
            <p><span>Last name:</span> <strong th:text="${user.getLastName()}">Last</strong></p>
            <p><span>Email:</span> <strong th:text="${user.getEmail()}">email</strong></p>
            <p><span>Role:</span> <strong th:text="${user.getRoleType()}">USER</strong></p>
        </div>

        <div class="profile-actions">
            <a th:href="@{/users/profile/edit}" class="profile-btn">Edit Profile</a>
            <a href="/orders" class="profile-btn secondary">My Orders</a>
        </div>

    </section>

</main>

<footer class="footer">
    <span class="copyright">
        © 2026 Shrooms Scaffold Solutions
    </span>

    <img src="/images/skull-logo.png"
         alt="Shrooms Logo"
         class="footer-logo">

    <span class="powered">
        Powered by T. Ivanova
    </span>
</footer>

</body>
</html>
