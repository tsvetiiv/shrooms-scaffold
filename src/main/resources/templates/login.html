<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Shrooms</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<header class="header">
  <a href="@{/}" class="logo">
    <img src="/images/skull-logo.png" alt="Shrooms logo">

    <div class="logo-text">
      <div class="logo-title">SHROOMS</div>
      <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
    </div>
  </a>

  <nav class="nav">
    <a th:href="@{/}" >Home</a>
    <a th:href="@{/our-work}">Our Work</a>
    <a th:href="@{/register}" class="register-btn">Register</a>
  </nav>
</header>

<main class="login-page">
  <section class="login-card">
    <h1>Login</h1>
    <p>Access your scaffold orders and custom requests.</p>

    <form th:action="@{/login}" th:method="post" th:object="${userLoginData}">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" th:field="*{username}" id="username">
        <p class="error"
           th:if="${#fields.hasErrors('username')}"
           th:errors="*{username}">
        </p>
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input type="password" th:field="*{password}" id="password">
        <p class="error"
           th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}">
        </p>
      </div>

      <small th:if="${loginError}"
             th:text="${loginError}">
      </small>

      <button type="submit">
        Login
      </button>

    </form>
  </section>
</main>
<div th:insert="~{fragments/common/footer :: footer}"></div>
</body>
</html>
