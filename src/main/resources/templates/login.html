<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Shrooms</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">
    <img src="/images/skull-logo.png" alt="Shrooms logo">

    <div class="logo-text">
      <div class="logo-title">SHROOMS</div>
      <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
    </div>
  </a>

  <nav class="nav">
    <a href="/">Home</a>
    <a href="/our-work">Our Work</a>
    <a href="/register" class="register-btn">Register</a>
  </nav>
</header>

<main class="login-page">
  <section class="login-card">
    <h1>Login</h1>
    <p>Access your scaffold orders and custom requests.</p>

    <form th:action="@{/login}" th:method="post" th:object="${userLoginData}">

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username"
               type="text"
               th:field="*{username}"
               placeholder="Enter username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input id="password"
               type="password"
               th:field="*{password}"
               placeholder="Enter password">
      </div>

      <small th:if="${loginError}"
             th:text="${loginError}">
      </small>

      <button type="submit">
        Login
      </button>

    </form>
  </section>
</main>
<footer class="footer">

    <span class="copyright">
        © 2026 Shrooms Scaffold Solutions
    </span>

  <img src="/images/skull-logo.png"
       alt="Shrooms Logo"
       class="footer-logo">

  <span class="powered">
        Powered by T. Ivanova
    </span>

</footer>
</body>
</html>
