<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile | Shrooms</title>
  <link rel="stylesheet" href="/css/edit-profile.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">
    <img src="/images/skull-logo.png" alt="Shrooms logo">

    <div class="logo-text">
      <div class="logo-title">SHROOMS</div>
      <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
    </div>
  </a>

  <nav class="nav">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/our-work}">Our Work</a>
    <a th:href="@{/orders}">My Orders</a>
    <a th:href="@{/logout}" class="logout-btn">Logout</a>
  </nav>
</header>

<main class="edit-page">
  <section class="edit-card">

    <h1>Edit Profile</h1>
    <div class="red-line"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" th:value="${user.username}" readonly>
    </div>

    <div class="form-group">
      <label>First Name</label>
      <input type="text" th:value="${user.firstName}">
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" th:value="${user.lastName}">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" th:value="${user.email}">
    </div>

    <div class="form-group">
      <label>Profile Picture URL</label>
      <input type="text" th:value="${user.profilePicture}">
    </div>

    <button type="button">Save Changes</button>

    <a th:href="@{/users/profile}" class="back-link">
      Back to Profile
    </a>

  </section>
</main>

<footer class="footer">
  <span class="copyright">© 2026 Shrooms Scaffold Solutions</span>

  <img src="/images/skull-logo.png"
       alt="Shrooms Logo"
       class="footer-logo">

  <span class="powered">Powered by T. Ivanova</span>
</footer>

</body>
</html>
