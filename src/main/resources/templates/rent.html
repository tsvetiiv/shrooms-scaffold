<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rent Scaffold | Shrooms</title>
    <link rel="stylesheet" th:href="@{/css/rent.css}">
</head>
<body>

<header class="header">
    <a th:href="@{/}" class="brand">
        <img src="/images/skull-logo.png" alt="Shrooms logo">
        <div>
            <div class="brand-title">SHROOMS</div>
            <div class="brand-subtitle">SCAFFOLD SOLUTIONS</div>
        </div>
    </a>

    <nav class="nav">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/our-work}">Our Work</a>
        <a th:href="@{/orders}">My Orders</a>
        <a th:href="@{/users/profile}">Profile</a>
        <a th:href="@{/logout}" class="logout-btn">Logout</a>
    </nav>
</header>

<main class="rent-page">
    <section class="rent-wrapper">

        <h1>Rent Scaffold</h1>
        <div class="red-line"></div>

        <div class="scaffold-grid">

            <article class="scaffold-card" th:each="scaffold : ${scaffolds}">

                <img th:src="${scaffold.imageUrl}"
                     th:alt="${scaffold.name}">

                <div class="scaffold-content">
                    <h2 th:text="${scaffold.name}">Scaffold name</h2>

                    <p th:text="${scaffold.description}">
                        Description
                    </p>

                    <div class="scaffold-info">
                        <span th:text="'Height: ' + ${scaffold.height} + ' m'"></span>
                        <span th:text="'Length: ' + ${scaffold.length} + ' m'"></span>
                        <span th:text="'Material: ' + ${scaffold.materialType}"></span>
                    </div>

                    <div class="price"
                         th:text="'€' + ${scaffold.priceForRent} + ' / week'">
                    </div>

                    <a th:href="@{/scaffolds/rent/{id}(id=${scaffold.id})}"
                       class="rent-btn">
                        Rent This Scaffold
                    </a>
                </div>

            </article>

        </div>

    </section>
</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
